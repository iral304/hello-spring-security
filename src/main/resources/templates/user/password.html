<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
    </style>
</head>

<footer class="text-center py-3 mt-4 border-top text-muted small">
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}"></p>
    <p>학번: 2071356 &nbsp;|&nbsp; 성명: 송정은</p>
</footer>

<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 500px;">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">비밀번호 변경</h4>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">현재 비밀번호</label>
                    <input type="password" class="form-control" th:field="*{currentPassword}"/>
                    <div th:if="${#fields.hasErrors('currentPassword')}"
                         class="text-danger small mt-1"
                         th:errors="*{currentPassword}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">새 비밀번호 (8자 이상)</label>
                    <input type="password" class="form-control" th:field="*{newPassword}"/>
                    <div th:if="${#fields.hasErrors('newPassword')}"
                         class="text-danger small mt-1"
                         th:errors="*{newPassword}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">새 비밀번호 확인</label>
                    <input type="password" class="form-control" th:field="*{confirmPassword}"/>
                    <div th:if="${#fields.hasErrors('confirmPassword')}"
                         class="text-danger small mt-1"
                         th:errors="*{confirmPassword}"></div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger px-4">변경하기</button>
                    <a th:href="@{/home}" class="btn btn-outline-secondary px-4">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
